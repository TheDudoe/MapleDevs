# MapleDevs — SEO Build Workflow
# Runs manually or triggered via Dashboard to build SEO landing pages.

name: Build SEO Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🍁 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Generate SEO Payloads
        run: |
          cd scripts
          npm install
          node build-seo.js
        
      - name: 🚀 Ping Google Indexing API
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: node scripts/google-index.js || echo "Skipping indexing (Secret not set)"

      - name: 💾 Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "🤖 Auto-generated SEO updates & static pages" || echo "No changes to commit"
          git pull --rebase origin main
          git push
